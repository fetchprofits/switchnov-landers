<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Resilience | SwitchNov</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#060a09] text-gray-300 p-6 md:p-12 font-sans">

    <section class="max-w-4xl mx-auto text-center py-20">
        <h1 class="text-5xl font-black text-white mb-6">The 2026 Resilience Blueprint</h1>
        <p class="text-xl text-gray-400 mb-12">Subconscious leadership for high-performance teams.</p>

        <div class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem]">
            <h2 class="text-2xl font-bold text-white mb-8">Request your Audit</h2>
            
            <form id="leadForm" class="flex flex-col md:flex-row justify-center gap-4">
                <input type="text" id="userName" name="name" required placeholder="Your Name" 
                       class="bg-white/5 border border-white/10 px-6 py-4 rounded-full text-white focus:outline-none focus:border-emerald-500">
                
                <input type="email" id="userEmail" name="email" required placeholder="Email" 
                       class="bg-white/5 border border-white/10 px-6 py-4 rounded-full text-white focus:outline-none focus:border-emerald-500">
                
                <button type="submit" id="submitBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-4 rounded-full font-bold transition">
                    Get the PDF
                </button>
            </form>
        </div>
    </section>

    <script>
        const form = document.getElementById('leadForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // YOUR MAKE URL GOES HERE - MUST HAVE HTTPS://
            const webhookUrl = 'https://hook.us2.make.com/fu0jr1v6robfyqetievc7dsp8vp7fxgv'; 

            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                source: 'SwitchNov Lander'
            };

            btn.innerText = 'Sending...';

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors', // Added for cross-origin safety
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    btn.innerText = 'Success!';
                    btn.style.backgroundColor = '#10b981';
                    form.reset();
                } else {
                    btn.innerText = 'Error: ' + response.status;
                }
            } catch (error) {
                console.error('Error:', error);
                btn.innerText = 'Failed to connect';
            }
        });
    </script>
</body>
</html>
